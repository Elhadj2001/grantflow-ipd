name: ci

# CI minimaliste GRANTFLOW IPD
# Lance lint + typecheck + tests sur chaque push et chaque PR vers main/sprint-*

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grantflow
          POSTGRES_PASSWORD: grantflow
          POSTGRES_DB: grantflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply DDL to test database
        env:
          PGPASSWORD: grantflow
        run: |
          psql -h localhost -U grantflow -d grantflow_test \
            -f docs/grantflow_ddl_postgresql.sql

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://grantflow:grantflow@localhost:5432/grantflow_test
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        env:
          DATABASE_URL: postgresql://grantflow:grantflow@localhost:5432/grantflow_test
          NODE_ENV: test
        run: npm run test

      - name: Upload coverage (Codecov optionnel)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage/
          if-no-files-found: ignore

  # Job secondaire : vérifier que le DDL parse correctement
  validate-ddl:
    name: Valider le DDL SYSCEBNL
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grantflow
          POSTGRES_PASSWORD: grantflow
          POSTGRES_DB: grantflow_ddl_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Apply DDL
        env:
          PGPASSWORD: grantflow
        run: |
          psql -h localhost -U grantflow -d grantflow_ddl_check \
            -f docs/grantflow_ddl_postgresql.sql

      - name: Vérifier les comptes SYSCEBNL (attendu ≥ 55)
        env:
          PGPASSWORD: grantflow
        run: |
          COUNT=$(psql -h localhost -U grantflow -d grantflow_ddl_check -tAc \
            "SELECT count(*) FROM ref.gl_account;")
          echo "Comptes SYSCEBNL trouvés : $COUNT"
          # Plancher "au moins 55" — détecte les régressions sans bloquer
          # les ajouts légitimes au fil des sprints (ex: 802 contre-engagement
          # ajouté au sprint 3).
          if [ "$COUNT" -lt "55" ]; then
            echo "::error::Nombre de comptes insuffisant : attendu au moins 55, trouvé $COUNT"
            exit 1
          fi

      - name: Vérifier les triggers critiques
        env:
          PGPASSWORD: grantflow
        run: |
          TRIGGERS=$(psql -h localhost -U grantflow -d grantflow_ddl_check -tAc "
            SELECT count(*) FROM information_schema.triggers
            WHERE trigger_name IN
              ('trg_compute_hash_chain', 'trg_journal_balance', 'trg_journal_entry_period');
          ")
          echo "Triggers critiques trouvés : $TRIGGERS"
          if [ "$TRIGGERS" -lt "3" ]; then
            echo "::error::Au moins un trigger critique manque (audit, balance, period)"
            exit 1
          fi

      # Sprint F4a — validation XML well-formedness sur la fixture SEPA.
      # xmllint est disponible nativement sur ubuntu-latest (paquet libxml2).
      # Pas de validation XSD ISO 20022 ici (XSD nécessite un téléchargement
      # depuis iso20022.org — manuel au 1er paiement réel). On vérifie au
      # minimum que la fixture est un XML bien formé et contient les nœuds
      # attendus du pain.001.001.03.
      - name: Vérifier la fixture SEPA (XML well-formed)
        run: |
          xmllint --noout tests/fixtures/sepa-pain001-sample.xml
          grep -q "urn:iso:std:iso:20022:tech:xsd:pain.001.001.03" \
            tests/fixtures/sepa-pain001-sample.xml \
            || { echo "::error::Namespace pain.001.001.03 manquant"; exit 1; }
          grep -q "<CstmrCdtTrfInitn>" tests/fixtures/sepa-pain001-sample.xml \
            || { echo "::error::Élément racine CstmrCdtTrfInitn manquant"; exit 1; }
          echo "Fixture SEPA pain.001.001.03 : structure OK"
