name: ci

# CI minimaliste GRANTFLOW IPD
# Lance lint + typecheck + tests sur chaque push et chaque PR vers main/sprint-*

on:
  push:
    branches:
      - main
      - "sprint-*"
  pull_request:
    branches:
      - main
      - "sprint-*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint-typecheck-test:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grantflow
          POSTGRES_PASSWORD: grantflow
          POSTGRES_DB: grantflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply DDL to test database
        env:
          PGPASSWORD: grantflow
        run: |
          psql -h localhost -U grantflow -d grantflow_test \
            -f docs/grantflow_ddl_postgresql.sql

      - name: Generate Prisma client
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://grantflow:grantflow@localhost:5432/grantflow_test
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        env:
          DATABASE_URL: postgresql://grantflow:grantflow@localhost:5432/grantflow_test
          NODE_ENV: test
        run: npm run test

      - name: Upload coverage (Codecov optionnel)
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: apps/api/coverage/
          if-no-files-found: ignore

  # Job secondaire : vérifier que le DDL parse correctement
  validate-ddl:
    name: Valider le DDL SYSCEBNL
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grantflow
          POSTGRES_PASSWORD: grantflow
          POSTGRES_DB: grantflow_ddl_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply DDL
        env:
          PGPASSWORD: grantflow
        run: |
          psql -h localhost -U grantflow -d grantflow_ddl_check \
            -f docs/grantflow_ddl_postgresql.sql

      - name: Vérifier les comptes SYSCEBNL (attendu = 55)
        env:
          PGPASSWORD: grantflow
        run: |
          COUNT=$(psql -h localhost -U grantflow -d grantflow_ddl_check -tAc \
            "SELECT count(*) FROM ref.gl_account;")
          echo "Comptes SYSCEBNL trouvés : $COUNT"
          if [ "$COUNT" != "55" ]; then
            echo "::error::Nombre de comptes incorrect : attendu 55, trouvé $COUNT"
            exit 1
          fi

      - name: Vérifier les triggers critiques
        env:
          PGPASSWORD: grantflow
        run: |
          TRIGGERS=$(psql -h localhost -U grantflow -d grantflow_ddl_check -tAc "
            SELECT count(*) FROM information_schema.triggers
            WHERE trigger_name IN
              ('trg_compute_hash_chain', 'trg_journal_balance', 'trg_journal_entry_period');
          ")
          echo "Triggers critiques trouvés : $TRIGGERS"
          if [ "$TRIGGERS" -lt "3" ]; then
            echo "::error::Au moins un trigger critique manque (audit, balance, period)"
            exit 1
          fi
